<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Ingreso de Proveedores</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    #login-form, #resultados {
      max-width: 700px;
      margin: auto;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    #filtros {
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div id="login-form">
    <h2>🔐 Ingreso de Proveedores</h2>
    <input type="text" id="cui" placeholder="CUIT/CUIL" style="width: 100%; padding: 8px;"><br><br>
    <input type="password" id="password" placeholder="Contraseña" style="width: 100%; padding: 8px;"><br><br>
    <button onclick="login()">Ingresar</button>
    <p id="error" style="color:red;"></p>
  </div>

  <div id="resultados" style="display:none;">
    <h2>📄 Entregas registradas</h2>
    <div id="filtros">
      <label>Filtrar por especie: 
        <select id="filtro-especie" onchange="filtrar()">
          <option value="">(Todas)</option>
        </select>
      </label>
      <p><strong>Total KgsD:</strong> <span id="total-kgs">0</span></p>
    </div>
    <table id="tabla">
      <thead>
        <tr>
          <th>Nro Jugos</th>
          <th>Fecha</th>
          <th>Remito</th>
          <th>CantBins</th>
          <th>Origen</th>
          <th>Especie</th>
          <th>NomVariedad</th>
          <th>KgsD</th>
          <th>Certificado</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    let entregas = [];

    function login() {
      const cui = document.getElementById("cui").value.trim();
      const password = document.getElementById("password").value.trim();

      fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ cui, password })
      })
      .then(res => {
        if (!res.ok) throw new Error("Login fallido");
        return res.json();
      })
      .then(data => {
        document.getElementById("login-form").style.display = "none";
        document.getElementById("resultados").style.display = "block";
        entregas = data;
        mostrarTabla(entregas);
        cargarFiltroEspecie(entregas);
      })
      .catch(err => {
        document.getElementById("error").innerText = "Usuario o contraseña inválidos.";
      });
    }

    function mostrarTabla(data) {
      const tbody = document.querySelector("#tabla tbody");
      tbody.innerHTML = "";
      let total = 0;

      data.forEach(row => {
        const tr = document.createElement("tr");

        const fechaExcel = parseFloat(row.Fecha);
        const fechaObj = new Date((fechaExcel - 25569) * 86400 * 1000);
        const fechaStr = fechaObj.toLocaleDateString("es-AR");

        tr.innerHTML = `
          <td>${row["Nro Jugos"]}</td>
          <td>${fechaStr}</td>
          <td>${row.Remito}</td>
          <td>${row.CantBins}</td>
          <td>${row.Origen}</td>
          <td>${row.Especie}</td>
          <td>${row.NomVariedad}</td>
          <td>${row.KgsD.toLocaleString()}</td>
          <td>${row.Certificado}</td>
        `;
        total += row.KgsD || 0;
        tbody.appendChild(tr);
      });

      document.getElementById("total-kgs").innerText = total.toLocaleString();
    }

    function cargarFiltroEspecie(data) {
      const select = document.getElementById("filtro-especie");
      const especies = [...new Set(data.map(e => e.Especie))];
      especies.sort().forEach(e => {
        const option = document.createElement("option");
        option.value = e;
        option.text = e;
        select.appendChild(option);
      });
    }

    function filtrar() {
      const valor = document.getElementById("filtro-especie").value;
      const filtrados = valor ? entregas.filter(e => e.Especie === valor) : entregas;
      mostrarTabla(filtrados);
    }
  </script>
</body>
</html>
