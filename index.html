<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal Proveedores</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
    input, button { padding: 10px; margin: 5px 0; width: 100%; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f0f0f0; }
    #error { color: red; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>🔐 Ingreso de Proveedores</h2>

  <input type="text" id="cui" placeholder="CUIT / CUIL" />
  <input type="password" id="password" placeholder="Contraseña" />
  <button onclick="login()">Ingresar</button>

  <div id="error"></div>
  <div id="tabla"></div>

  <script>
    async function login() {
      const cui = document.getElementById("cui").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorDiv = document.getElementById("error");
      const tablaDiv = document.getElementById("tabla");

      errorDiv.textContent = "";
      tablaDiv.innerHTML = "";

      if (!cui || !password) {
        errorDiv.textContent = "Por favor complete CUIT y contraseña.";
        return;
      }

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cui, password })
        });

        if (res.status === 401) {
          errorDiv.textContent = "❌ CUIT o contraseña incorrectos.";
          return;
        }

        if (!res.ok) {
          errorDiv.textContent = "❌ Error en el servidor.";
          return;
        }

        const data = await res.json();

        if (data.length === 0) {
          tablaDiv.innerHTML = "<p>No hay entregas registradas.</p>";
          return;
        }

        // Mostrar la tabla
        let html = "<table><thead><tr>";
        Object.keys(data[0]).forEach(key => {
          html += `<th>${key}</th>`;
        });
        html += "</tr></thead><tbody>";

        data.forEach(row => {
          html += "<tr>";
          Object.values(row).forEach(val => {
            html += `<td>${val}</td>`;
          });
          html += "</tr>";
        });

        html += "</tbody></table>";
        tablaDiv.innerHTML = html;

      } catch (err) {
        errorDiv.textContent = "❌ Error de red.";
        console.error(err);
      }
    }
  </script>
</body>
</html>
